<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Our Menu</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <a href="index.html" class="logo">TastyBites.</a>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="menu.html">Menu</a>
            <a href="history.html">History</a>
            <a href="login.html">Login</a>
            <a href="#" class="btn-logout">Logout</a>
        </div>
    </nav>

    <div class="container">
        <h1>Our Popular Dishes</h1>
        
        <div class="food-grid">
            <!-- Item 1 -->
            <div class="food-card">
                <!-- Use a placeholder image from the web -->
                <img src="https://via.placeholder.com/300x200?text=Burger" alt="Burger">
                <h3>Classic Smash Burger</h3>
                <p>$12.99</p>
                <button style="margin-top:10px; padding:5px 15px; background:var(--primary); border:none; color:white; cursor:pointer;">Order</button>
            </div>

            <!-- Item 2 -->
            <div class="food-card">
                <img src="https://via.placeholder.com/300x200?text=Pizza" alt="Pizza">
                <h3>Pepperoni Pizza</h3>
                <p>$15.50</p>
                <button style="margin-top:10px; padding:5px 15px; background:var(--primary); border:none; color:white; cursor:pointer;">Order</button>
            </div>

            <!-- Item 3 -->
            <div class="food-card">
                <img src="https://via.placeholder.com/300x200?text=Sushi" alt="Sushi">
                <h3>Salmon Sushi Set</h3>
                <p>$22.00</p>
                <button style="margin-top:10px; padding:5px 15px; background:var(--primary); border:none; color:white; cursor:pointer;">Order</button>
            </div>
        </div>
    </div>
</body>
</html>

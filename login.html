<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - CrispyAndDeal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>🍔 CrispyAndDeal</h1>
        <nav>
            <a href="index.html">Home</a>
            <a href="menu.html">Menu</a>
            <a href="history.html">History</a>
            <a href="login.html" id="loginLink">Login</a>
            <a href="#" id="logoutLink" onclick="handleLogout()" style="display: none;">Logout</a>
            <a href="menu.html">Cart (<span id="cartCount">0</span>)</a>
        </nav>
    </header>

    <div class="container">
        <div class="form-container">
            <h2>Login to Your Account</h2>
            <form id="loginForm">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" placeholder="Enter your username" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Enter your password" required>
                </div>
                <button type="submit" class="btn" style="width: 100%;">Login</button>
            </form>
            <p style="text-align: center; margin-top: 1.5rem; color: #666;">
                Don't have an account? <a href="#" style="color: #ff6b35; text-decoration: none;">Sign up here</a>
            </p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
